# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: build-frontend

on:
  push:
    branches: [ "main" ]
    paths:
      - game/**
      - frontend/**
#   tags:
#     - 'v*.*.*'
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
        REGISTRY: ghcr.io
        IMAGE_NAME: frontend
  
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: |
            game
            frontend
    
    - name: Build game
      id: build
      uses: firebelley/godot-export@v6.0.0
      with:
        godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
        godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
        relative_project_path: ./game
        use_preset_export_path: true
    
    - name: Move game to Svelcordot
      run: mv ./game/build/marboota-game/*.{js,wasm,pck} ./frontend/public/game/marboota-game
    
    - name: Setup client vars
      run: |
        touch ./frontend/.env
        echo "DISCORD_CLIENT_ID=${{ secrets.CLIENT_ID }}" >> ./frontend/.env
        echo "VITE_DISCORD_CLIENT_ID=${{ secrets.CLIENT_ID }}" >> ./frontend/.env
        echo "DISCORD_CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}" >> ./frontend/.env
        echo "NODE_OPTIONS="--enable-source-maps"" >> ./frontend/.env
        echo "PORT="3000"" >> ./frontend/.env
  
    - name: Login to ghcr
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
    
    - name: Build and push
      uses: docker/build-push-action@v6
      with:
            context: ./frontend
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}